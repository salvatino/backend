server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/edugest_pro?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        'format_sql': true
    open-in-view: false